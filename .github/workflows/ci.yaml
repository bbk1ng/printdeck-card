name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Upload built bundle (for pre-merge testing in HA)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: printdeck-card-pr${{ github.event.pull_request.number }}
          path: dist/printdeck-card.js
